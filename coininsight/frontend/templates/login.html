{% extends "base.html" %}

{% block title %}CoinInsight — Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center ci-auth-container">
    <div class="col-md-5 col-lg-4">
        <div class="ci-auth-card">
            <!-- Logo -->
            <div class="text-center mb-4">
                <div class="ci-auth-logo">
                    <i class="bi bi-currency-bitcoin"></i>
                </div>
                <h1 class="ci-auth-title">CoinInsight</h1>
                <p class="ci-auth-subtitle">Inicia sesión en tu cuenta</p>
            </div>

            <!-- Formulario de Login -->
            <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label ci-label">
                        <i class="bi bi-envelope"></i> Email
                    </label>
                    <input type="email"
                           class="form-control ci-input"
                           id="email"
                           name="email"
                           placeholder="tu@email.com"
                           required
                           autocomplete="email">
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label ci-label">
                        <i class="bi bi-lock"></i> Contraseña
                    </label>
                    <input type="password"
                           class="form-control ci-input"
                           id="password"
                           name="password"
                           placeholder="••••••••"
                           required
                           autocomplete="current-password">
                </div>

                <button type="submit" class="btn ci-btn-primary w-100" id="login-submit">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </button>
            </form>

            <!-- Link a registro -->
            <div class="text-center mt-4">
                <p class="ci-auth-link">
                    ¿No tienes cuenta?
                    <a href="{{ url_for('auth.register') }}">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
